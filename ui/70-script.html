<script>
"use strict";
/* ============================================================
   DRAAI — local music on real speakers, zero cloud.
   No external requests, no storage. Same-origin JSON API.
   Falls back to a self-contained demo when no backend responds.
============================================================ */
const $=(s,r=document)=>r.querySelector(s), $$=(s,r=document)=>[...r.querySelectorAll(s)], enc=encodeURIComponent;
const REDUCE=matchMedia("(prefers-reduced-motion: reduce)").matches;
if(REDUCE) document.body.classList.add("reduce");
let DEMO=false;

const A={
  speakers:[], speaker:null, folder:"", trackCount:0,
  tracks:[], albums:[], query:"", view:"albums", albumKey:null,
  sel:new Set(), collapsed:new Set(), selMode:false, group:"none", sort:"title", dir:1, playlists:[], theme:"auto",
  status:{state:"STOPPED",title:"",position:"0:00:00",duration:"0:00:00",volume:30,track_no:0},
  queue:[], queueIds:[], shuffle:false,
  curId:null, eq:{bass:0,treble:0,loudness:false}, eqOK:true, sleepMin:0, accessUrl:"",
};

/* ---------------- API ---------------- */
async function api(path, body){
  if(DEMO) return Demo.route(path, body);
  const opt = body!==undefined ? {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)} : {};
  const res = await fetch(path, opt);
  let data={}; try{ data=await res.json(); }catch(e){}
  if(!res.ok) throw new Error(data&&data.error?data.error:"HTTP "+res.status);
  return data;
}

/* ---------------- utils ---------------- */
const parseTime=s=>{ if(typeof s==="number")return s; if(!s)return 0; let t=0; for(const n of String(s).split(":"))t=t*60+(+n||0); return t; };
const fmt=sec=>{ sec=Math.max(0,Math.round(sec)); const h=(sec/3600)|0,m=(sec%3600/60)|0,s=sec%60; return (h?h+":"+String(m).padStart(2,"0"):m)+":"+String(s).padStart(2,"0"); };
const hash=str=>{ let h=0; str=String(str); for(let i=0;i<str.length;i++)h=(h*31+str.charCodeAt(i))|0; return Math.abs(h); };
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function hsl2rgb(h,s,l){ s/=100;l/=100; const k=n=>(n+h/30)%12, a=s*Math.min(l,1-l), f=n=>l-a*Math.max(-1,Math.min(k(n)-3,9-k(n),1)); return [255*f(0),255*f(8),255*f(4)]; }

/* ---------------- palette engine ---------------- */
// current + target palettes (rgb arrays), lerped every frame for a cinematic cross-fade
let pal={ac:[120,210,255],ac2:[180,150,255],bg1:[16,16,22],bg2:[22,18,30]};
let palT={...pal};
function readableAccent(c){
  // guarantee accents are bright enough to read on the dark UI:
  // lift toward white until relative luminance reaches a floor, keeping hue
  const lum=(0.2126*c[0]+0.7152*c[1]+0.0722*c[2])/255, floor=0.55;
  if(lum>=floor) return c;
  const t=(floor-lum)/(1-lum);
  return [c[0]+(255-c[0])*t, c[1]+(255-c[1])*t, c[2]+(255-c[2])*t];
}
function setPaletteTarget(p){
  p={...p, ac:readableAccent(p.ac), ac2:readableAccent(p.ac2)};
  palT=p; if(REDUCE){ pal={...p}; applyPal(); } }
function adaptForTheme(c,isAccent){ return c; }
function applyPal(){ const rs=document.documentElement.style;
  rs.setProperty("--np-ac",`${pal.ac[0]|0} ${pal.ac[1]|0} ${pal.ac[2]|0}`);
  rs.setProperty("--np-ac2",`${pal.ac2[0]|0} ${pal.ac2[1]|0} ${pal.ac2[2]|0}`);
  rs.setProperty("--np-bg1",`${pal.bg1[0]|0} ${pal.bg1[1]|0} ${pal.bg1[2]|0}`);
  rs.setProperty("--np-bg2",`${pal.bg2[0]|0} ${pal.bg2[1]|0} ${pal.bg2[2]|0}`);
}
function paletteFromImage(img){ try{
  const N=26,c=document.createElement("canvas"); c.width=c.height=N; const x=c.getContext("2d",{willReadFrequently:true});
  x.drawImage(img,0,0,N,N); const d=x.getImageData(0,0,N,N).data;
  const buckets={};
  for(let i=0;i<d.length;i+=4){ const r=d[i],g=d[i+1],b=d[i+2];
    const mx=Math.max(r,g,b),mn=Math.min(r,g,b),sat=mx?(mx-mn)/mx:0,lum=(mx+mn)/2;
    if(lum<18||lum>242)continue;
    const key=(r>>5)+","+(g>>5)+","+(b>>5);
    const bk=buckets[key]||(buckets[key]={r:0,g:0,b:0,n:0,sat:0}); bk.r+=r;bk.g+=g;bk.b+=b;bk.n++;bk.sat+=sat;
  }
  const arr=Object.values(buckets).map(bk=>({r:bk.r/bk.n,g:bk.g/bk.n,b:bk.b/bk.n,score:(bk.sat/bk.n)*bk.n,sat:bk.sat/bk.n}));
  if(!arr.length) return null;
  arr.sort((a,b)=>b.score-a.score);
  const vib=(c)=>{ const mx=Math.max(c.r,c.g,c.b)||1,k=Math.min(2.2,205/mx); return [clamp(c.r*k,20,255),clamp(c.g*k,20,255),clamp(c.b*k,20,255)]; };
  const ac=vib(arr[0]);
  let sec=arr.find(c=>Math.abs(Math.atan2(c.g-c.b,c.r-c.g)-Math.atan2(arr[0].g-arr[0].b,arr[0].r-arr[0].g))>.6)||arr[1]||arr[0];
  const ac2=vib(sec);
  const dark=(c,f)=>[c.r*f,c.g*f,c.b*f];
  return {ac,ac2,bg1:dark(arr[0],.28),bg2:dark(sec,.24)};
}catch(e){ return null; }}
function paletteFromHash(seed){ const h=hash(seed)%360, h2=(h+52)%360;
  return {ac:hsl2rgb(h,82,66),ac2:hsl2rgb(h2,72,64),bg1:hsl2rgb(h,45,11),bg2:hsl2rgb(h2,40,10)}; }

/* ---------------- artwork ---------------- */
const artCache={};
function getArt(id){ // resolves to {img} or null (no art) ; sets covers + palette
  if(id==null) return;
  const url = DEMO ? Demo.art(id) : "/api/art?id="+enc(id);
  const img=new Image();
  img.onload=()=>{ artCache[id]=url; $("#dockArt").src=url; $("#npArt").src=url; $("#dLabel").style.backgroundImage="url('"+url+"')"; $("#dockCover").classList.add("hasart"); $("#npArtWrap").classList.add("hasart");
    const p=paletteFromImage(img); setPaletteTarget(p||paletteFromHash(id)); };
  img.onerror=()=>{ $("#dLabel").style.backgroundImage=""; $("#dockCover").classList.remove("hasart"); $("#npArtWrap").classList.remove("hasart"); setPaletteTarget(paletteFromHash(id)); };
  img.src=url;
}

/* ---------------- analysis + visualizer ---------------- */
let analysis=null, anaId=null, anaPollTimer=null;
async function loadAnalysis(id){ analysis=null; anaId=id; clearTimeout(anaPollTimer);
  const fetchOnce=async()=>{ try{ const d=DEMO?Demo.analysis(id):await api("/api/analysis?id="+enc(id));
      if(d.status==="ready"){ analysis=d; buildPeaks(); }
      else if(d.status==="pending"){ anaPollTimer=setTimeout(()=>{ if(anaId===id)fetchOnce(); },2000); }
    }catch(e){} };
  fetchOnce();
}
let PEAKS=new Float32Array(0);
function buildPeaks(){ const p=(analysis&&analysis.peaks)||[]; PEAKS=Float32Array.from(p,v=>v/100); }
function energyAt(sec){ if(!analysis) return null; const st=analysis.step||0.1, f=sec/st, i=f|0, fr=f-i;
  const g=a=>{ if(!a||!a.length)return 0; const x=a[Math.min(a.length-1,i)]||0,y=a[Math.min(a.length-1,i+1)]||0; return (x+(y-x)*fr)/100; };
  return {amp:g(analysis.amp),low:g(analysis.low),mid:g(analysis.mid),high:g(analysis.high),
          ampL:analysis.ampL?g(analysis.ampL):g(analysis.amp),
          ampR:analysis.ampR?g(analysis.ampR):g(analysis.amp)}; }

/* smooth playback clock (advance locally between 2s polls) + energy smoothing */
let posSec=0, durSec=0, playing=false, last=performance.now();
let sm={amp:0,low:0,mid:0,high:0};
function tick(t){ const dt=Math.min(.05,(t-last)/1000); last=t;
  if(playing && durSec>0) posSec=Math.min(durSec,posSec+dt);
  // palette lerp (~1.4s cinematic)
  if(!REDUCE){ const k=1-Math.exp(-dt/0.42); for(const key of ["ac","ac2","bg1","bg2"]) for(let i=0;i<3;i++) pal[key][i]+=(palT[key][i]-pal[key][i])*k; applyPal(); }
  // energy
  const e=playing?energyAt(posSec):null;
  const tgt=e&&!REDUCE?e:{amp:0,low:0,mid:0,high:0};
  const ek=1-Math.exp(-dt/0.09);
  for(const k of ["amp","low","mid","high"]) sm[k]+=(tgt[k]-sm[k])*ek;
  const rs=document.documentElement.style;
  rs.setProperty("--e-amp",sm.amp.toFixed(3)); rs.setProperty("--e-low",sm.low.toFixed(3));
  rs.setProperty("--e-mid",sm.mid.toFixed(3)); rs.setProperty("--e-high",sm.high.toFixed(3));
  // seek + waveforms
  const prog=durSec>0?clamp(posSec/durSec,0,1):0;
  $("#posLabel").textContent=fmt(posSec); $("#durLabel").textContent=fmt(durSec);
  $("#npPos").textContent=fmt(posSec); $("#npDur").textContent=fmt(durSec);
  drawWave(dockCv,prog); if($("#np").classList.contains("open")) drawWave(npCv,prog);
  if($("#amp").classList.contains("open")) drawAmp(dt,t,prog);
  if($("#spec").classList.contains("open")) drawSpec(dt,t,prog);
  requestAnimationFrame(tick);
}
function mkCanvas(sel){ const wrap=$(sel), cv=wrap.querySelector("canvas"), ctx=cv.getContext("2d"); return {wrap,cv,ctx}; }
let dockCv, npCv;
function sizeCanvas(o){ const r=o.wrap.getBoundingClientRect(), dpr=Math.min(2,devicePixelRatio||1);
  o.cv.width=Math.max(1,r.width*dpr); o.cv.height=Math.max(1,r.height*dpr); o.ctx.setTransform(dpr,0,0,dpr,0,0); o.W=r.width; o.H=r.height; }
function drawWave(o,prog){ if(!o.W) sizeCanvas(o); const {ctx,W,H}=o; ctx.clearRect(0,0,W,H);
  const n=PEAKS.length||120, gap=1, bw=W/n, cy=H/2;
  const acc=(o===npCv)?`rgb(${pal.ac[0]|0} ${pal.ac[1]|0} ${pal.ac[2]|0})`:"rgb(94 234 212)";
  const shimmer=1+sm.high*0.9;
  for(let i=0;i<n;i++){ let v=PEAKS.length?PEAKS[i]:(0.35+0.4*Math.abs(Math.sin(i*0.6)));
    v=Math.max(0.04,v); const played=(i/n)<=prog;
    let h=v*H*0.92; if(played){ const near=1-Math.min(1,Math.abs(i/n-prog)*10); h*=(1+near*(shimmer-1)*0.5); }
    const x=i*bw; ctx.fillStyle=played?acc:(o===npCv?"rgba(255,255,255,0.2)":WAVE_DIM);
    if(played) ctx.globalAlpha=0.75+0.25*Math.min(1,sm.amp+0.4); else ctx.globalAlpha=1;
    ctx.fillRect(x,cy-h/2,Math.max(1,bw-gap),h);
  }
  ctx.globalAlpha=1;
  // playhead
  const px=prog*W; ctx.fillStyle=(o===npCv)?"#fff":PLAYHEAD; ctx.fillRect(px-1,0,2,H);
}
